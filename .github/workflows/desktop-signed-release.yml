name: Signed Desktop Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    environment: desktop-production
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact: lwt-desktop-linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            build_args: --bundles deb,appimage
            bundle_root: target/release/bundle
          - runner: windows-2025
            artifact: lwt-desktop-windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            build_args: --bundles msi,nsis
            bundle_root: target/release/bundle

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: signed-${{ matrix.rust_target }}

      - run: npm ci
      - name: Validate release tag and application versions
        run: npm run release:validate -- --tag "${{ github.ref_name }}"
      - run: npm run check
      - run: npm test

      - name: Validate updater signing secrets
        shell: bash
        env:
          UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          test -n "$UPDATER_PRIVATE_KEY" || { echo 'Missing TAURI_SIGNING_PRIVATE_KEY'; exit 1; }
          test -n "$UPDATER_PRIVATE_KEY_PASSWORD" || { echo 'Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD'; exit 1; }
          test -n "$UPDATER_PUBLIC_KEY" || { echo 'Missing TAURI_UPDATER_PUBLIC_KEY variable'; exit 1; }

      - name: Create protected release configuration
        env:
          LWT_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: >-
          node scripts/create-release-config.mjs
          --output "${{ runner.temp }}/tauri.release.conf.json"

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_LWT_UPDATES_ENABLED: 'true'
          NO_STRIP: ${{ runner.os == 'Linux' && '1' || '' }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: LWT Desktop ${{ github.ref_name }}
          releaseBody: Windows installers are unsigned and may show an unknown-publisher warning. Verify the attached checksums and SBOM before installation.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.build_args }} --config ${{ runner.temp }}/tauri.release.conf.json

      - name: Smoke test signed Linux package installation and removal
        if: runner.os == 'Linux'
        run: |
          package_path="$(realpath "$(find target/release/bundle/deb -name '*.deb' -print -quit)")"
          test -n "$package_path"
          sudo apt-get install -y "$package_path"
          test -x /usr/bin/lwt-desktop
          dpkg-query --show lwt-desktop
          sudo apt-get remove -y lwt-desktop
          test ! -e /usr/bin/lwt-desktop

      - name: Remove release configuration
        if: always()
        shell: bash
        run: rm -f "${{ runner.temp }}/tauri.release.conf.json"

      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ matrix.bundle_root }}
          format: cyclonedx-json
          output-file: ${{ matrix.bundle_root }}/${{ matrix.artifact }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate release checksums
        run: >-
          node scripts/release-integrity.mjs
          --root "${{ matrix.bundle_root }}"
          --output "${{ matrix.bundle_root }}/${{ matrix.artifact }}.SHA256SUMS"

      - name: Attach integrity metadata to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ github.ref_name }}"
          "${{ matrix.bundle_root }}/${{ matrix.artifact }}.cdx.json"
          "${{ matrix.bundle_root }}/${{ matrix.artifact }}.SHA256SUMS"
          --clobber

  arch:
    name: lwt-desktop-arch-x86_64
    needs: release
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    environment: desktop-production
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Install Arch build dependencies
        run: >-
          pacman -Syu --noconfirm
          git github-cli nodejs npm rustup webkit2gtk-4.1
          cairo desktop-file-utils gdk-pixbuf2 glib2 gtk3 hicolor-icon-theme
          libayatana-appindicator librsvg libsoup3 pango patchelf

      - uses: actions/checkout@v6

      - name: Configure Rust
        run: rustup default stable

      - run: npm ci
      - name: Validate release tag and application versions
        run: npm run release:validate -- --tag "${{ github.ref_name }}"
      - run: npm run check
      - run: npm test
      - run: npx tauri build --no-bundle

      - name: Build pacman package as an unprivileged user
        run: |
          useradd --create-home packagebuilder
          chown -R packagebuilder:packagebuilder "$GITHUB_WORKSPACE"
          runuser -u packagebuilder -- npm run package:arch:staged

      - name: Smoke test Arch package installation and removal
        run: |
          package_path="$(find artifacts/arch -name '*.pkg.tar.zst' -print -quit)"
          test -n "$package_path"
          pacman -U --noconfirm "$package_path"
          test -x /usr/bin/lwt-desktop
          test -f /usr/share/applications/lwt-desktop.desktop
          pacman -Q lwt-desktop
          pacman -R --noconfirm lwt-desktop
          test ! -e /usr/bin/lwt-desktop
          test ! -e /usr/share/applications/lwt-desktop.desktop

      - name: Generate Arch package SBOM
        uses: anchore/sbom-action@v0
        with:
          path: artifacts/arch
          format: cyclonedx-json
          output-file: artifacts/arch/lwt-desktop-arch-x86_64.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate Arch package checksums
        run: >-
          node scripts/release-integrity.mjs
          --root artifacts/arch
          --output artifacts/arch/lwt-desktop-arch-x86_64.SHA256SUMS

      - name: Attach Arch package and integrity metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ github.ref_name }}"
          artifacts/arch/*.pkg.tar.zst
          artifacts/arch/lwt-desktop-arch-x86_64.cdx.json
          artifacts/arch/lwt-desktop-arch-x86_64.SHA256SUMS
          --clobber

  integrity:
    name: complete-release-integrity
    needs: [release, arch]
    runs-on: ubuntu-24.04
    environment: desktop-production
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: npm

      - name: Download every draft release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "${{ runner.temp }}/release-assets"
          gh release download "${{ github.ref_name }}" --dir "${{ runner.temp }}/release-assets"

      - name: Validate the complete release asset inventory
        run: |
          version="${{ github.ref_name }}"
          node scripts/validate-release-assets.mjs \
            "${{ runner.temp }}/release-assets" \
            "${version#v}"

      - name: Generate and verify the complete release checksum manifest
        run: |
          node scripts/release-integrity.mjs \
            --root "${{ runner.temp }}/release-assets" \
            --output "${{ runner.temp }}/release-assets/SHA256SUMS" \
            --all-files
          cd "${{ runner.temp }}/release-assets"
          sha256sum --check SHA256SUMS

      - name: Attach complete checksum manifest to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release upload "${{ github.ref_name }}"
          "${{ runner.temp }}/release-assets/SHA256SUMS"
          --clobber
